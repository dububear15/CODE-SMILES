<header class="luxury-header">
  <div class="nav-wrapper">
    <div class="brand-section" (click)="isPatientView ? goDashboard() : scrollToSection('home')">
      <img src="logo.png" alt="Code Smiles Logo" class="main-logo" />
      <div class="logo-text">
        <span class="main-name">CODE SMILES</span>
      </div>
    </div>

    <nav class="nav-links">
      <!-- PUBLIC HEADER -->
      <ng-container *ngIf="!isPatientView">
        <a (click)="scrollToSection('home')">HOME</a>
        <a (click)="scrollToSection('services')">SERVICES</a>
        <a (click)="scrollToSection('about')">ABOUT US</a>
        <a (click)="scrollToSection('contact')">CONTACT</a>
      </ng-container>

      <!-- PATIENT HEADER -->
      <ng-container *ngIf="isPatientView">
        <a routerLink="/patient-dashboard">DASHBOARD</a>
        <a routerLink="/my-appointments">APPOINTMENTS</a>
        <a routerLink="/records">RECORDS</a>
        <a routerLink="/profile">PROFILE</a>

        <div class="clinic-dropdown">
          <button type="button" class="clinic-toggle" (click)="toggleClinicMenu()">
            CLINIC <span class="dropdown-arrow">▾</span>
          </button>

          <div class="clinic-menu" *ngIf="isClinicMenuOpen">
            <button type="button" (click)="goToPublicSection('services')">Services</button>
            <button type="button" (click)="goToPublicSection('about')">About Us</button>
            <button type="button" (click)="goToPublicSection('contact')">Contact Us</button>
          </div>
        </div>
      </ng-container>
    </nav>

    <div class="action-buttons">
      <!-- PUBLIC ACTIONS -->
      <ng-container *ngIf="!isPatientView">
        <a routerLink="/login" class="header-login-link">LOGIN</a>
        <button class="book-btn" routerLink="/booking">BOOK APPOINTMENT</button>
      </ng-container>

      <!-- PATIENT ACTIONS -->
      <ng-container *ngIf="isPatientView">
        <div class="notif-wrapper">
          <button
            class="icon-circle notif-btn"
            type="button"
            aria-label="Notifications"
            (click)="toggleNotifications()"
          >
            🔔
            <span class="notif-badge" *ngIf="unreadCount > 0">
              {{ unreadCount }}
            </span>
          </button>

          <div class="notif-dropdown" *ngIf="isNotifOpen">
            <div class="notif-header">
              <h4>Notifications</h4>
            </div>

            <div class="notif-tabs">
              <button
                type="button"
                [class.active]="selectedNotifTab === 'all'"
                (click)="setNotifTab('all')"
              >
                All
              </button>

              <button
                type="button"
                [class.active]="selectedNotifTab === 'unread'"
                (click)="setNotifTab('unread')"
              >
                Unread
              </button>
            </div>

            <div class="notif-items">
              <div
                class="notif-item"
                *ngFor="let notif of filteredNotifications"
                [class.unread]="!notif.read"
                (click)="markAsRead(notif)"
              >
                <div class="notif-icon">{{ notif.icon }}</div>

                <div class="notif-text">
                  <strong>{{ notif.title }}</strong>
                  <p>{{ notif.message }}</p>
                  <span>{{ notif.time }}</span>
                </div>
              </div>
            </div>

            <button class="view-all-btn" (click)="goToNotifications()">
              View All Notifications
            </button>
          </div>
        </div>

        <a (click)="logout()" class="header-logout-link">LOGOUT</a>

        <button class="book-btn" routerLink="/booking">
          BOOK APPOINTMENT
        </button>
      </ng-container>
    </div>
  </div>
</header>
