<header class="luxury-header" [class.patient-header-mode]="isPatientView">
  <div class="nav-wrapper" [class.patient-nav-wrapper]="isPatientView">
    <!-- PUBLIC MODE -->
    <ng-container *ngIf="!isPatientView">
      <div
        class="brand-section"
        (click)="scrollToSection('home')"
      >
        <img src="logo.png" alt="Code Smiles Logo" class="main-logo" />
        <div class="logo-text">
          <span class="main-name">CODE SMILES</span>
        </div>
      </div>

      <nav class="nav-links">
        <a (click)="scrollToSection('home')">HOME</a>
        <a (click)="scrollToSection('services')">SERVICES</a>
        <a (click)="scrollToSection('about')">ABOUT US</a>
        <a (click)="scrollToSection('contact')">CONTACT</a>
      </nav>

      <div class="action-buttons">
  <a routerLink="/login" class="header-login-link">LOGIN</a>
  <button class="book-btn" routerLink="/register">BOOK APPOINTMENT</button>
</div>
    </ng-container>

    <!-- PATIENT MODE -->
    <ng-container *ngIf="isPatientView">
      <!-- LEFT -->
      <div class="patient-brand-panel" (click)="goDashboard()">
        <img src="logo.png" alt="Code Smiles Logo" class="patient-brand-logo" />
        <div class="patient-brand-copy">
          <strong>CODE SMILES</strong>
          <span>Patient Portal</span>
        </div>
      </div>

      <!-- CENTER -->
      <div class="patient-toolbar-center">
        <div class="patient-searchbar">
          <span class="search-icon">⌕</span>
          <span class="search-placeholder">Search portal</span>
          <span class="search-shortcut">⌘F</span>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="patient-toolbar-actions">
        <div class="notif-wrapper">
          <button
            class="patient-icon-btn notif-btn"
            type="button"
            aria-label="Notifications"
            (click)="toggleNotifications()"
          >
            🔔
            <span class="notif-badge" *ngIf="unreadCount > 0">
              {{ unreadCount }}
            </span>
          </button>

          <div class="notif-dropdown" *ngIf="isNotifOpen">
            <div class="notif-header">
              <h4>Notifications</h4>
            </div>

            <div class="notif-tabs">
              <button
                type="button"
                [class.active]="selectedNotifTab === 'all'"
                (click)="setNotifTab('all')"
              >
                All
              </button>

              <button
                type="button"
                [class.active]="selectedNotifTab === 'unread'"
                (click)="setNotifTab('unread')"
              >
                Unread
              </button>
            </div>

            <div class="notif-items">
              <div
                class="notif-item"
                *ngFor="let notif of filteredNotifications"
                [class.unread]="!notif.read"
                (click)="markAsRead(notif)"
              >
                <div class="notif-icon">{{ notif.icon }}</div>

                <div class="notif-text">
                  <strong>{{ notif.title }}</strong>
                  <p>{{ notif.message }}</p>
                  <span>{{ notif.time }}</span>
                </div>
              </div>
            </div>

            <button class="view-all-btn" (click)="goToNotifications()">
              View All Notifications
            </button>
          </div>
        </div>

        <button class="patient-icon-btn" type="button" aria-label="Messages">
          ✉
        </button>

        <div class="patient-profile-chip">
          <div class="patient-mini-avatar">M</div>
          <div class="patient-mini-text">
            <strong>Mark Anthony</strong>
            <span>Verified Patient</span>
          </div>
        </div>

        <a (click)="logout()" class="patient-logout-link">LOGOUT</a>

        <button class="patient-cta-btn" routerLink="/booking">
          BOOK APPOINTMENT
        </button>
      </div>
    </ng-container>
  </div>
</header>
